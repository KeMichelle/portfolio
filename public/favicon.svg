<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Michelle Aprile favicon</title>
  <desc id="desc">An elegant italic M on a soft pastel background.</desc>
  <defs>
    <linearGradient id="bg" x1="10%" y1="8%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#fffaf7" />
      <stop offset="55%" stop-color="#ffe8f0" />
      <stop offset="100%" stop-color="#f4edff" />
    </linearGradient>
    <radialGradient id="glow" cx="28%" cy="20%" r="62%">
      <stop offset="0%" stop-color="#fff3b8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#fff3b8" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7a6688" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect x="5" y="5" width="54" height="54" rx="18" fill="url(#bg)" />
  <rect x="5" y="5" width="54" height="54" rx="18" fill="url(#glow)" />
  <rect x="5.75" y="5.75" width="52.5" height="52.5" rx="17.4" fill="none" stroke="#ffffff" stroke-opacity="0.78" stroke-width="1.5" />
  <g filter="url(#shadow)">
    <text
      x="50%"
      y="53%"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="Cormorant Garamond, Times New Roman, serif"
      font-size="34"
      font-style="italic"
      font-weight="700"
      letter-spacing="-2"
      fill="#473954"
    >M</text>
  </g>
</svg>